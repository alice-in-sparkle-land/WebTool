<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My People - Personal CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f6f0; 
            --card-bg: #ffffff;
            --primary: #a3c9a8; 
            --primary-hover: #8eb894;
            --text-main: #4a5d4e;
            --text-light: #7a8c7e;
            --border-radius: 16px;
            --pastel-pink: #fde2e4;
            --pastel-blue: #e2ece9;
            --danger-hover: #ff8a95;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }

        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem;
            background-image: radial-gradient(#d5e5d5 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2rem; background: var(--card-bg); padding: 1.5rem;
            border-radius: var(--border-radius); box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        h1 { font-size: 1.8rem; display: flex; align-items: center; gap: 10px; }
        .actions { display: flex; gap: 10px; }

        button {
            background-color: var(--primary); color: white; border: none;
            padding: 0.6rem 1.2rem; border-radius: 20px; font-weight: 600;
            cursor: pointer; transition: background 0.3s ease; font-size: 0.9rem;
        }
        button:hover { background-color: var(--primary-hover); }
        
        .btn-outline { background-color: transparent; color: var(--primary); border: 2px solid var(--primary); }
        .btn-outline:hover { background-color: var(--primary); color: white; }

        /* Form Area */
        .add-person-form {
            background: var(--card-bg); padding: 1.5rem; border-radius: var(--border-radius);
            margin-bottom: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
            border-top: 5px solid var(--primary);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .add-person-form.highlight {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(163, 201, 168, 0.4);
            border-color: #8eb894;
        }

        .form-full { grid-column: span 2; }
        .mode-indicator { grid-column: span 2; font-size: 0.9rem; color: var(--primary); font-weight: bold; }

        input, textarea {
            width: 100%; padding: 0.8rem; border: 2px solid #eef2ee;
            border-radius: 12px; background: #fafcfa; color: var(--text-main);
            font-size: 1rem; transition: border 0.3s;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); }
        textarea { resize: vertical; min-height: 80px; }
        label { display: block; margin-bottom: 0.3rem; font-weight: 600; font-size: 0.9rem; color: var(--text-light); }

        /* Grid Area */
        .people-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }

        .person-card {
            background: var(--card-bg); border-radius: var(--border-radius); padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); position: relative;
            display: flex; flex-direction: column;
        }

        .card-header {
            display: flex; align-items: center; gap: 15px; margin-bottom: 1rem;
            padding-bottom: 1rem; border-bottom: 2px dashed #eef2ee;
        }
        .avatar {
            width: 50px; height: 50px; border-radius: 50%; background-color: var(--pastel-pink);
            display: flex; justify-content: center; align-items: center; font-size: 1.5rem;
            flex-shrink: 0; object-fit: cover;
        }
        .card-title h3 { font-size: 1.3rem; margin-bottom: 2px; }

        .delete-btn {
            position: absolute; top: 15px; right: 15px; background: none; border: none;
            color: #ffb3ba; font-size: 1.2rem; cursor: pointer; padding: 0;
        }
        .delete-btn:hover { color: var(--danger-hover); background: none; }

        .info-block { margin-bottom: 1rem; }
        .info-block h4 {
            font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;
            color: var(--primary); margin-bottom: 0.6rem;
        }
        
        .entry-item {
            display: flex; justify-content: space-between; align-items: flex-start;
            background: var(--pastel-blue); padding: 0.6rem 0.8rem;
            border-radius: 10px; margin-bottom: 0.5rem; font-size: 0.95rem; line-height: 1.4;
        }
        .info-block.notes .entry-item { background: var(--pastel-pink); }
        
        .entry-text { flex-grow: 1; white-space: pre-wrap; }
        .delete-entry-btn {
            background: none; border: none; color: #a0aab0; cursor: pointer;
            padding: 0 0 0 10px; font-size: 1rem; flex-shrink: 0; margin-top: -2px;
        }
        .delete-entry-btn:hover { color: var(--danger-hover); background: none; }

        .empty-state { font-size: 0.9rem; color: var(--text-light); font-style: italic; margin-bottom: 0.5rem;}
        #fileInput { display: none; }

        /* Card footer for update button */
        .card-footer { margin-top: auto; padding-top: 1rem; }
        .quick-update-btn { width: 100%; border-style: dashed; }

        @media (max-width: 600px) {
            .add-person-form { grid-template-columns: 1fr; }
            .form-full { grid-column: span 1; }
            header { flex-direction: column; gap: 1rem; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🌱 My People</h1>
            <div class="actions">
                <button class="btn-outline" onclick="exportData()">Export JSON</button>
                <button class="btn-outline" onclick="document.getElementById('fileInput').click()">Import JSON</button>
                <input type="file" id="fileInput" accept=".json" onchange="importData(event)">
            </div>
        </header>

        <form class="add-person-form" id="personForm" onsubmit="handleSubmit(event)">
            <div class="mode-indicator" id="modeIndicator">✨ Creating New Person</div>
            
            <div>
                <label>Name (Search existing or type new)</label>
                <input type="text" id="name" list="peopleNames" placeholder="e.g., Linh" autocomplete="off" oninput="checkName()" required>
                <datalist id="peopleNames"></datalist>
            </div>
            <div>
                <label>Avatar (Emoji or Image URL - Optional)</label>
                <input type="text" id="avatar" placeholder="e.g., 🌸 or https://...">
            </div>
            <div class="form-full">
                <label>Add Personal Data (Facts)</label>
                <textarea id="personalData" placeholder="e.g., Birthday on Oct 12, loves airplanes"></textarea>
            </div>
            <div class="form-full">
                <label>Add a Note / Idea</label>
                <textarea id="notes" placeholder="e.g., Currently waiting for job announcement"></textarea>
            </div>
            <div class="form-full">
                <button type="submit" id="submitBtn">➕ Add Person</button>
            </div>
        </form>

        <div class="people-grid" id="peopleGrid">
            </div>
    </div>

    <script>
        // Load & Migrate Data
        let peopleData = JSON.parse(localStorage.getItem('myPeopleData')) || [];
        peopleData = peopleData.map(p => {
            if (!p.id) p.id = Date.now() + Math.random(); 
            if (typeof p.personalData === 'string') p.personalData = p.personalData ? [p.personalData] : [];
            if (typeof p.notes === 'string') p.notes = p.notes ? [p.notes] : [];
            return p;
        });
        saveData();

        function saveData() { localStorage.setItem('myPeopleData', JSON.stringify(peopleData)); }

        // Update datalist for auto-suggestions
        function updateDatalist() {
            const datalist = document.getElementById('peopleNames');
            datalist.innerHTML = '';
            peopleData.forEach(p => {
                const option = document.createElement('option');
                option.value = p.name;
                datalist.appendChild(option);
            });
        }

        // Check if typed name exists to change form mode
        function checkName() {
            const inputName = document.getElementById('name').value.trim().toLowerCase();
            const exists = peopleData.find(p => p.name.toLowerCase() === inputName);
            
            const indicator = document.getElementById('modeIndicator');
            const submitBtn = document.getElementById('submitBtn');

            if (exists && inputName !== '') {
                indicator.innerHTML = `📝 Updating existing profile for: ${exists.name}`;
                submitBtn.innerHTML = `➕ Add Notes to ${exists.name}`;
                document.getElementById('avatar').placeholder = "Leave blank to keep current avatar";
            } else {
                indicator.innerHTML = `✨ Creating New Profile`;
                submitBtn.innerHTML = `➕ Add New Person`;
                document.getElementById('avatar').placeholder = "e.g., 🌸 or https://...";
            }
        }

        // Triggered when clicking "Quick Update" on a card
        function triggerUpdate(name) {
            const form = document.getElementById('personForm');
            
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            // Fill name and trigger UI update
            document.getElementById('name').value = name;
            checkName();
            
            // Focus on the notes box automatically
            document.getElementById('notes').focus();

            // Give the form a little pop animation so you know it's ready
            form.classList.add('highlight');
            setTimeout(() => { form.classList.remove('highlight'); }, 600);
        }

        // Handle Add/Update Form Submit
        function handleSubmit(event) {
            event.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const avatarInput = document.getElementById('avatar').value.trim();
            const personalDataInput = document.getElementById('personalData').value.trim();
            const notesInput = document.getElementById('notes').value.trim();

            if (!name) return;

            let person = peopleData.find(p => p.name.toLowerCase() === name.toLowerCase());

            if (person) {
                // Update Existing Person
                if (avatarInput) person.avatar = avatarInput;
                if (personalDataInput) person.personalData.push(personalDataInput); // Add to bottom
                if (notesInput) person.notes.push(notesInput); // Add to bottom
                
                // Move updated person to top
                peopleData = peopleData.filter(p => p.id !== person.id);
                peopleData.unshift(person);
            } else {
                // Create New Person
                person = {
                    id: Date.now(),
                    name: name,
                    avatar: avatarInput || '👻',
                    personalData: personalDataInput ? [personalDataInput] : [],
                    notes: notesInput ? [notesInput] : []
                };
                peopleData.unshift(person);
            }

            saveData();
            renderPeople();
            document.getElementById('personForm').reset();
            checkName(); 
        }

        // Delete entire person
        function deletePerson(id) {
            if(confirm('Are you sure you want to remove this person entirely?')) {
                peopleData = peopleData.filter(p => p.id !== id);
                saveData();
                renderPeople();
            }
        }

        // Delete single note/fact
        function deleteEntry(personId, field, index) {
            const person = peopleData.find(p => p.id === personId);
            if (person) {
                person[field].splice(index, 1);
                saveData();
                renderPeople();
            }
        }

        // Render HTML for entries
        function renderEntries(personId, field, items) {
            if (items.length === 0) return `<div class="empty-state">Nothing here yet.</div>`;
            return items.map((item, index) => `
                <div class="entry-item">
                    <span class="entry-text">${item}</span>
                    <button class="delete-entry-btn" onclick="deleteEntry(${personId}, '${field}', ${index})" title="Delete note">×</button>
                </div>
            `).join('');
        }

        // Render cards to the screen
        function renderPeople() {
            updateDatalist();
            const grid = document.getElementById('peopleGrid');
            grid.innerHTML = '';

            peopleData.forEach((person) => {
                const isUrl = person.avatar.startsWith('http');
                const avatarContent = isUrl 
                    ? `<img src="${person.avatar}" class="avatar" alt="avatar">` 
                    : `<div class="avatar">${person.avatar || '👻'}</div>`;

                const card = document.createElement('div');
                card.className = 'person-card';
                card.innerHTML = `
                    <button class="delete-btn" onclick="deletePerson(${person.id})" title="Delete Profile">✖</button>
                    <div class="card-header">
                        ${avatarContent}
                        <div class="card-title"><h3>${person.name}</h3></div>
                    </div>
                    <div class="info-block">
                        <h4>Personal Data</h4>
                        ${renderEntries(person.id, 'personalData', person.personalData)}
                    </div>
                    <div class="info-block notes">
                        <h4>My Notes</h4>
                        ${renderEntries(person.id, 'notes', person.notes)}
                    </div>
                    <div class="card-footer">
                        <button class="btn-outline quick-update-btn" onclick="triggerUpdate('${person.name}')">📝 Quick Update</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Export/Import
        function exportData() {
            if (peopleData.length === 0) return alert("Nothing to export yet!");
            const dataStr = JSON.stringify(peopleData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const a = document.createElement('a');
            a.href = url; a.download = 'my_people_backup.json';
            a.click(); URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) {
                        peopleData = importedData;
                        saveData(); renderPeople();
                        alert("Data imported successfully! ✨");
                    } else alert("Invalid file format.");
                } catch (error) { alert("Error reading the file."); }
            };
            reader.readAsText(file);
            event.target.value = ''; 
        }

        renderPeople();
    </script>
</body>
</html>
